<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>London Architectural Tour</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 500px; width: 100%; border-radius: 8px; margin-top: 20px; }
        body { font-family: sans-serif; margin: 20px; }
        .popup-title { font-weight: bold; }
    </style>
</head>
<body>
    <h2>Saturday Priority Circuit</h2>
    <div id="map"></div>
    <script>
        const map = L.map('map').setView([51.51, -0.11], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const locations = [
            { name: "Alexandra Road Estate", coords: [51.5397, -0.1824], type: "Estate" },
            { name: "Regent Street", coords: [51.5133, -0.1395], type: "Shopping" },
            { name: "Sir John Soane's Museum", coords: [51.5170, -0.1175], type: "Essential" },
            { name: "Barbican Centre", coords: [51.5202, -0.0938], type: "Estate" },
            { name: "Tate Modern", coords: [51.5076, -0.0994], type: "Essential" },
            { name: "The Scoop", coords: [51.5034, -0.0945], type: "Modern" },
            { name: "Westminster", coords: [51.4995, -0.1248], type: "Heritage" }
        ];

        locations.forEach(loc => {
            L.marker(loc.coords).addTo(map)
                .bindPopup(`<span class="popup-title">${loc.name}</span><br>${loc.type}`);
        });
    </script>
</body>
</html>
