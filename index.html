<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Tour</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/784/784850.png" type="image/png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --orange: #FF8C00; --white: #FFFFFF; }
        body { font-family: sans-serif; margin: 0; scroll-behavior: smooth; }
        header { background: var(--orange); padding: 1rem; color: var(--white); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { cursor: pointer; font-weight: bold; font-size: 1.5rem; }
        section { padding: 40px 20px; }
        #map { height: 500px; width: 100%; border-radius: 8px; z-index: 1; }
        .stats { display: flex; gap: 20px; margin: 20px 0; font-weight: bold; color: var(--orange); }
        .info-panel { background: #f9f9f9; padding: 20px; border-radius: 8px; }
        footer { background: #f4f4f4; padding: 20px; text-align: center; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">TRAVEL-LOGO</div>
    <button style="background:white; border:none; padding:10px; cursor:pointer;" onclick="document.getElementById('map').scrollIntoView()">Map View</button>
</header>

<section>
    <h2>Optimized Architecture Route</h2>
    <div class="stats">
        <div>Total Distance: ~23.5 km</div>
        <div>Outlier: Swain's Lane (Highgate)</div>
    </div>
    <div id="map"></div>
    <div class="info-panel">
        <h3>Step-by-Step Itinerary</h3>
        <ul id="route-details"></ul>
    </div>
</section>

<footer>
    <p>Contact: info@architour.com</p>
    <p>© 2026 Travel Planner. All Rights Reserved.</p>
</footer>

<script>
    const spots = [
        { name: "Swain's Lane", lat: 51.5653, lng: -0.1478 },
        { name: "Alexandra Road Estate", lat: 51.5395, lng: -0.1789 },
        { name: "Sherlock Holmes Museum", lat: 51.5238, lng: -0.1585 },
        { name: "Regent Street", lat: 51.5133, lng: -0.1395 },
        { name: "Soane Museum", lat: 51.5170, lng: -0.1175 },
        { name: "Barbican Estate", lat: 51.5200, lng: -0.0939 },
        { name: "Tate Modern", lat: 51.5076, lng: -0.0994 },
        { name: "The Scoop", lat: 51.5046, lng: -0.0792 },
        { name: "Westminster", lat: 51.4995, lng: -0.1248 }
    ];

    const map = L.map('map').setView([51.53, -0.13], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const latlngs = spots.map(s => [s.lat, s.lng]);
    const list = document.getElementById('route-details');

    spots.forEach((spot, i) => {
        L.marker([spot.lat, spot.lng]).addTo(map).bindPopup(spot.name);
        if (i < spots.length - 1) {
            const d = (L.latLng(spot.lat, spot.lng).distanceTo(L.latLng(spots[i+1].lat, spots[i+1].lng)) / 1000).toFixed(2);
            const li = document.createElement('li');
            li.innerHTML = `<strong>${spot.name}</strong> → <strong>${spots[i+1].name}</strong>: ${d} km`;
            list.appendChild(li);
        }
    });

    L.polyline(latlngs, {color: '#FF8C00', weight: 5}).addTo(map);
    map.fitBounds(L.polyline(latlngs).getBounds());
</script>
</body>
</html>
