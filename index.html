<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architectural London | 2026</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏢</text></svg>">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --orange: #f97316; --white: #ffffff; --text: #0f172a; --sub: #64748b; --friday: #10b981; --saturday: #6366f1; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--white); color: var(--text); scroll-behavior: smooth; }
        header { padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #ffffffe6; backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid #eee; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--orange); text-decoration: none; font-weight: 700; }
        .hero { height: 35vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?auto=format&fit=crop&w=1200&q=80'); background-size: cover; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin: 0; }
        .start-btn { margin-top: 1rem; padding: 1rem 2.5rem; background: var(--orange); color: white; text-decoration: none; border-radius: 50px; font-weight: 700; transition: transform 0.2s; border: none; cursor: pointer; }
        .map-container { padding: 2rem; max-width: 1100px; margin: auto; }
        .map-frame { height: 500px; width: 100%; border-radius: 12px; border: 1px solid #eee; margin-bottom: 1rem; }
        .day-label { color: var(--orange); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 1.2rem; border-bottom: 2px solid var(--orange); display: inline-block; margin-bottom: 1.5rem; }
        footer { padding: 4rem 2rem; background: #fafafa; border-top: 1px solid #eee; text-align: center; }
        .footer-links { margin-bottom: 1.5rem; }
        .footer-links a { color: var(--sub); text-decoration: none; margin: 0 1rem; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">LON_ARCH</a>
    <a href="https://www.google.com/maps" target="_blank" class="start-btn" style="margin-top:0; padding: 0.6rem 1.2rem; font-size: 0.75rem;">View on Google Maps</a>
</header>

<div class="hero">
    <h1>London Itinerary</h1>
    <p>Architecture, Art & Landmarks | 2026</p>
    <a href="#friday" class="start-btn">Start Project</a>
</div>

<div class="map-container" id="friday">
    <div class="day-label">Friday: Transit & Favorites</div>
    <div id="mapFriday" class="map-frame"></div>
</div>

<div class="map-container" id="saturday">
    <div class="day-label">Saturday: Core Architecture</div>
    <div id="mapSaturday" class="map-frame"></div>
</div>

<footer>
    <div class="footer-links">
        <a href="mailto:contact@lonarch.com">Contact Information</a>
        <a href="#">Privacy Policy</a>
    </div>
    <p>© 2026 Architectural Discovery. All rights reserved to all files written.</p>
</footer>

<script>
    const FRI_COLOR = '#10b981';
    const SAT_COLOR = '#6366f1';
    const HOME_COLOR = '#f97316';
    const tiles = 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

    // Friday Map Data
    const mapFri = L.map('mapFriday').setView([51.50, -0.15], 11);
    L.tileLayer(tiles).addTo(mapFri);
    
    const friPoints = [
        { name: "Heathrow Airport", lat: 51.4707, lng: -0.4599 },
        { name: "Victoria Coach Station", lat: 51.4931, lng: -0.1486 },
        { name: "Home", lat: 51.4536, lng: -0.1951, color: HOME_COLOR },
        { name: "National Gallery", lat: 51.5089, lng: -0.1283 },
        { name: "Natural History Museum", lat: 51.4967, lng: -0.1764 },
        { name: "Camden Lock Market", lat: 51.5415, lng: -0.1458 },
        { name: "Sherlock Holmes Museum", lat: 51.5237, lng: -0.1585 },
        { name: "Daunt Books", lat: 51.5208, lng: -0.1531 },
        { name: "Match Shop", lat: 51.5380, lng: -0.1800 },
        { name: "Zara / H&M", lat: 51.5153, lng: -0.1420 }
    ];

    friPoints.forEach(p => {
        L.circleMarker([p.lat, p.lng], {
            radius: 8, fillColor: p.color || FRI_COLOR, color: "#fff", weight: 2, fillOpacity: 0.9
        }).addTo(mapFri).bindPopup(`<strong>${p.name}</strong>`);
    });

    // Saturday Map Data
    const mapSat = L.map('mapSaturday').setView([51.52, -0.13], 12);
    L.tileLayer(tiles).addTo(mapSat);

    const satPoints = [
        { name: "Home", lat: 51.4536, lng: -0.1951, color: HOME_COLOR },
        { name: "Alexandra Road Estate", lat: 51.5395, lng: -0.1789, color: SAT_COLOR },
        { name: "Sir John Soane's Museum", lat: 51.5170, lng: -0.1175, color: SAT_COLOR },
        { name: "LSE Saw Swee Hock", lat: 51.5144, lng: -0.1165, color: SAT_COLOR },
        { name: "Tate Modern", lat: 51.5076, lng: -0.0994, color: SAT_COLOR },
        { name: "The Scoop", lat: 51.5034, lng: -0.0945, color: SAT_COLOR },
        { name: "Westminster", lat: 51.4995, lng: -0.1248, color: SAT_COLOR }
    ];

    satPoints.forEach(p => {
        L.circleMarker([p.lat, p.lng], {
            radius: 8, fillColor: p.color, color: "#fff", weight: 2, fillOpacity: 0.9
        }).addTo(mapSat).bindPopup(`<strong>${p.name}</strong>`);
    });
</script>

</body>
</html>
